# SSL Certificate Renewal Workflow
# Automatically renews SSL certificates on all servers every month using Route53
name: Renew SSL Certificates
run-name: ${{ github.actor }} is renewing SSL certificates 🔐

on:
  schedule:
    # Run at 02:00 UTC on the 1st of every month
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      server:
        description: "Target server (leave empty for all servers)"
        required: false
        type: choice
        options:
          - ""
          - server-us
          - server-dublin
          - server-sgp

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      servers: ${{ steps.get-servers.outputs.servers }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine target servers
        id: get-servers
        run: |
          if [[ ! -f deploy-config.json ]]; then
            echo "Error: deploy-config.json not found"
            exit 1
          fi

          CONFIG=$(cat deploy-config.json)
          SELECTED_SERVER="${{ github.event.inputs.server }}"

          if [[ -n "$SELECTED_SERVER" ]]; then
            # Use specific server
            SERVERS=$(echo "$CONFIG" | jq -c --arg target "$SELECTED_SERVER" '[.servers[] | select(.id == $target)]')
          else
            # Use all servers
            SERVERS=$(echo "$CONFIG" | jq -c '.servers')
          fi

          # Validate servers is not empty
          if [[ -z "$SERVERS" || "$SERVERS" == "[]" || "$SERVERS" == "null" ]]; then
            if [[ -n "$SELECTED_SERVER" ]]; then
              echo "Error: No servers found for target: $SELECTED_SERVER"
            else
              echo "Error: No servers configured in deploy-config.json"
            fi
            exit 1
          fi

          echo "servers=$SERVERS" >> $GITHUB_OUTPUT
          echo "Target servers: $SERVERS"

  renew-ssl:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        server: ${{ fromJson(needs.prepare.outputs.servers) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout LinuxConfig repository
        uses: actions/checkout@v4
        with:
          repository: tikmatrix/LinuxConfig
          token: ${{ secrets.REPO_TOKEN }}
          path: LinuxConfig

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Renew SSL certificates on ${{ matrix.server.id }}
        env:
          CONFIG_FILE: deploy-config.json
          SSH_KEY_FILE: ~/.ssh/deploy_key
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SSL_METHOD: route53
        run: |
          chmod +x ./LinuxConfig/shell/ssl-renew.sh
          ./LinuxConfig/shell/ssl-renew.sh "${{ matrix.server.id }}"

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/deploy_key
