name: Build Script - Windows
run-name: ${{ github.actor }} is building Script (Windows) 🚀
on:
  workflow_call:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        type: string
      branch:
        description: "Branch to build from"
        required: false
        default: "main"
        type: string
      build_target:
        description: "Build target"
        required: false
        default: "script"
        type: string

permissions:
  contents: read

jobs:
  build-script-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        target: [x86_64-pc-windows-msvc]

    steps:
      - name: Checkout tikmatrix-pro private repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          repository: tikmatrix/tikmatrix-pro
          token: ${{ secrets.REPO_TOKEN }}
          ref: ${{ inputs.branch }}
          path: tikmatrix-pro

      - name: Cache Rust dependencies
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            tikmatrix-pro\target\${{ matrix.target }}
          key: ${{ runner.os }}-script-cargo-${{ matrix.target }}-${{ hashFiles('tikmatrix-pro/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-script-cargo-${{ matrix.target }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install target platform
        run: rustup target add ${{ matrix.target }}

      - name: Build script
        working-directory: tikmatrix-pro
        run: cargo build -p script --release --target ${{ matrix.target }}

      - name: Prepare bin directory
        run: |
          New-Item -ItemType Directory -Force -Path ./tikmatrix-pro/target/${{ matrix.target }}/release/bin

          # Ensure bin folder is clean to avoid uploading stale binaries
          if (Test-Path "./tikmatrix-pro/target/${{ matrix.target }}/release/bin/*") {
            Remove-Item -Force -Recurse ./tikmatrix-pro/target/${{ matrix.target }}/release/bin/*
          }

          if (Test-Path "./tikmatrix-pro/target/${{ matrix.target }}/release/script.exe") {
            Copy-Item ./tikmatrix-pro/target/${{ matrix.target }}/release/script.exe ./tikmatrix-pro/target/${{ matrix.target }}/release/bin/
          }
        shell: pwsh

      - name: Upload to R2
        uses: ryand56/r2-upload-action@b801a390acbdeb034c5e684ff5e1361c06639e7c # v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID_NIO }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID_NIO }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY_NIO }}
          r2-bucket: matrix
          source-dir: .\tikmatrix-pro\target\${{ matrix.target }}\release\bin
          destination-dir: ${{ matrix.target }}_v2

      - name: Update Library Version
        run: |
          $VERSION = "${{ inputs.version }}"
          $PLATFORM = "windows"

          # Calculate MD5 for script
          $SCRIPT_MD5 = ""
          if (Test-Path "./tikmatrix-pro/target/${{ matrix.target }}/release/bin/script.exe") {
            $SCRIPT_MD5 = (Get-FileHash -Path "./tikmatrix-pro/target/${{ matrix.target }}/release/bin/script.exe" -Algorithm MD5).Hash.ToLower()
            Write-Host "Script MD5: $SCRIPT_MD5"
          }

          $SCRIPT_UPDATE_DATA = [PSCustomObject]@{
            name        = "script"
            platform    = $PLATFORM
            downloadUrl = "https://api.tikmatrix.com/front-api/release/${{ matrix.target }}_v2/script.exe"
            version     = $VERSION
            app         = "TikMatrix"
            md5         = $SCRIPT_MD5
          } | ConvertTo-Json -Compress

          Write-Host "Updating script library..."
          try {
            $headers = @{
              "Content-Type" = "application/json"
              "Authorization" = "Bearer ${{ secrets.API_KEY }}"
            }
            Invoke-RestMethod -Uri "https://api.tikmatrix.com/ci/update_lib_v2" -Method Post -Headers $headers -Body $SCRIPT_UPDATE_DATA
            Write-Host "Script library updated successfully"
          } catch {
            Write-Host "Error updating script library: $_"
            exit 1
          }

          Write-Host "Updated script library for $PLATFORM to $VERSION"
        shell: pwsh
