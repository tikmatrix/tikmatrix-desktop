name: Build Matrix - Linux
run-name: ${{ github.actor }} is building Matrix (Linux) 🚀
on:
  workflow_call:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        type: string
      branch:
        description: "Branch to build from"
        required: false
        default: "main"
        type: string
      build_apps:
        description: "Apps to build"
        required: false
        default: "all"
        type: string
      notes:
        description: "Release notes (English)"
        required: false
        default: ""
        type: string
      gray_percentage:
        description: "Gray release percentage (0-100)"
        required: false
        default: "0"
        type: string

permissions:
  contents: read

jobs:
  build-tikmatrix-pro:
    if: ${{ inputs.build_apps == 'all' || inputs.build_apps == 'tikmatrix.pro' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          path: ci-tools

      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          repository: tikmatrix/tikmatrix-pro
          token: ${{ secrets.REPO_TOKEN }}
          ref: ${{ inputs.branch }}
          path: tikmatrix-pro

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: tikmatrix-pro/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Rust Cache
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./tikmatrix-pro/target
          key: ${{ runner.os }}-cargo-tikmatrix-pro-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tikmatrix-pro-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm install
        working-directory: tikmatrix-pro

      - name: Build TikMatrix Pro package
        run: |
          chmod +x ./build-linux.sh
          ./build-linux.sh
        working-directory: tikmatrix-pro
        env:
          RUSTFLAGS: "-A warnings"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare official package upload
        run: |
          UPLOAD_DIR=./tikmatrix-pro/target/release/bundle/deb-upload
          mkdir -p "$UPLOAD_DIR"
          find ./tikmatrix-pro/target/release/bundle/deb -maxdepth 1 -type f -exec cp -t "$UPLOAD_DIR" -- {} +
          if ! find "$UPLOAD_DIR" -maxdepth 1 -type f -print -quit | grep -q .; then
            echo "No top-level deb artifacts found for upload"
            exit 1
          fi

      - name: Upload official package to R2
        uses: ryand56/r2-upload-action@b801a390acbdeb034c5e684ff5e1361c06639e7c # v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID_NIO }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID_NIO }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY_NIO }}
          r2-bucket: matrix
          source-dir: ./tikmatrix-pro/target/release/bundle/deb-upload
          destination-dir: ./

      - name: Update TikMatrix Pro download url
        env:
          TIKMATRIX_API_KEY: ${{ secrets.TIKMATRIX_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cd tikmatrix-pro
          node ./scripts/update-download-url.js --platform=linux --distributor=OFFICIAL --app=tikmatrix.pro --app-name='TikMatrix Pro'

