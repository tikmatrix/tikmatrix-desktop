name: Build Matrix - All Platforms
run-name: ${{ github.actor }} is building Matrix (All Platforms) 🚀
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        type: string
      branch:
        description: "Branch to build from"
        required: false
        default: "main"
        type: string
      platforms:
        description: "Platforms to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
      app:
        description: "App to build"
        required: true
        default: "All"
        type: choice
        options:
          - All
          - TikMatrix
          - TikMatrix Pro
          - IgMatrix
      notes:
        description: "Release notes (English). Used as fallback for all languages."
        required: false
        default: ""
        type: string
      gray_percentage:
        description: "Gray release percentage (0-100). Default 10 = roll out to 10% of devices first."
        required: false
        default: "10"
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_apps: ${{ steps.map-app.outputs.build_apps }}
    steps:
      - name: Map app name to internal value
        id: map-app
        env:
          APP_INPUT: ${{ inputs.app }}
        run: |
          case "$APP_INPUT" in
            "All")
              echo "build_apps=all" >> $GITHUB_OUTPUT
              ;;
            "TikMatrix")
              echo "build_apps=tikmatrix" >> $GITHUB_OUTPUT
              ;;
            "TikMatrix Pro")
              echo "build_apps=tikmatrix.pro" >> $GITHUB_OUTPUT
              ;;
            "IgMatrix")
              echo "build_apps=igmatrix" >> $GITHUB_OUTPUT
              ;;
            *)
              # Fallback to all (should never reach here due to choice validation)
              echo "::warning::Unknown app input: $APP_INPUT, falling back to 'all'"
              echo "build_apps=all" >> $GITHUB_OUTPUT
              ;;
          esac

  create-tag:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          repository: tikmatrix/tikmatrix-pro
          token: ${{ secrets.REPO_TOKEN }}
          ref: ${{ inputs.branch }}

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if tag already exists on remote
          if git ls-remote --tags origin | grep -q "refs/tags/${{ inputs.version }}$"; then
            echo "Tag ${{ inputs.version }} already exists on remote, skipping tag creation"
          else
            git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
            git push origin "${{ inputs.version }}"
            echo "Tag ${{ inputs.version }} created and pushed successfully"
          fi

  build-matrix-windows:
    needs: [prepare, create-tag]
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'windows' }}
    uses: ./.github/workflows/build-matrix-windows.yml
    with:
      version: ${{ inputs.version }}
      branch: ${{ inputs.branch }}
      build_apps: ${{ needs.prepare.outputs.build_apps }}
      notes: ${{ inputs.notes }}
      gray_percentage: ${{ inputs.gray_percentage }}
    secrets: inherit

  build-matrix-macos:
    needs: [prepare, create-tag]
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'macos' }}
    uses: ./.github/workflows/build-matrix-macos.yml
    with:
      version: ${{ inputs.version }}
      branch: ${{ inputs.branch }}
      build_apps: ${{ needs.prepare.outputs.build_apps }}
      notes: ${{ inputs.notes }}
      gray_percentage: ${{ inputs.gray_percentage }}
    secrets: inherit
  notify:
    needs: [build-matrix-windows, build-matrix-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RESULTS='${{ toJson(needs) }}'
          if echo "$RESULTS" | grep -q '"failure"'; then ICON="❌"; \
          elif echo "$RESULTS" | grep -q '"cancelled"'; then ICON="⚠️"; \
          else ICON="✅"; fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf '%s\n%s\n%s' \
            "${ICON} ${{ github.workflow }}" \
            "Version: ${{ inputs.version }} | App: ${{ inputs.app }} | Platforms: ${{ inputs.platforms }}" \
            "Run: ${RUN_URL}")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}"
