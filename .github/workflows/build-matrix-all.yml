name: Build Matrix - All Platforms
run-name: ${{ github.actor }} is building Matrix (All Platforms) 🚀
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0), or 'auto' to use date+sha"
        required: false
        default: "auto"
        type: string
      branch:
        description: "Branch to build from"
        required: false
        default: "main"
        type: string
      platforms:
        description: "Platforms to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
      app:
        description: "App to build"
        required: true
        default: "All"
        type: choice
        options:
          - All
          - TikMatrix
          - TikMatrix Pro
          - IgMatrix
      notes:
        description: "Release notes (English). Used as fallback for all languages."
        required: false
        default: ""
        type: string
      gray_percentage:
        description: "Gray release percentage (0-100). Default 0 = roll out to 0% of devices first."
        required: false
        default: "0"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_apps: ${{ steps.map-app.outputs.build_apps }}
    steps:
      - name: Map app name to internal value
        id: map-app
        env:
          APP_INPUT: ${{ inputs.app }}
        run: |
          case "$APP_INPUT" in
            "All")
              echo "build_apps=all" >> $GITHUB_OUTPUT
              ;;
            "TikMatrix")
              echo "build_apps=tikmatrix" >> $GITHUB_OUTPUT
              ;;
            "TikMatrix Pro")
              echo "build_apps=tikmatrix.pro" >> $GITHUB_OUTPUT
              ;;
            "IgMatrix")
              echo "build_apps=igmatrix" >> $GITHUB_OUTPUT
              ;;
            *)
              # Fallback to all (should never reach here due to choice validation)
              echo "::warning::Unknown app input: $APP_INPUT, falling back to 'all'"
              echo "build_apps=all" >> $GITHUB_OUTPUT
              ;;
          esac

  create-tag:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: tikmatrix/tikmatrix-pro
          token: ${{ secrets.REPO_TOKEN }}
          ref: ${{ inputs.branch }}

      - name: Resolve version
        id: resolve-version
        run: |
          if [[ "${{ inputs.version }}" == "auto" || -z "${{ inputs.version }}" ]]; then
            VERSION="v$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.resolve-version.outputs.version }}"

          if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
            echo "Tag ${VERSION} already exists on remote, skipping tag creation"
          else
            git tag -a "${VERSION}" -m "Release ${VERSION}"
            git push origin "${VERSION}"
            echo "Tag ${VERSION} created and pushed successfully"
          fi

  build-matrix-windows:
    needs: [prepare, create-tag]
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'windows' }}
    uses: ./.github/workflows/build-matrix-windows.yml
    with:
      version: ${{ needs.create-tag.outputs.version }}
      branch: ${{ inputs.branch }}
      build_apps: ${{ needs.prepare.outputs.build_apps }}
      notes: ${{ inputs.notes }}
      gray_percentage: ${{ inputs.gray_percentage }}
    secrets: inherit

  build-matrix-macos:
    needs: [prepare, create-tag]
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'macos' }}
    uses: ./.github/workflows/build-matrix-macos.yml
    with:
      version: ${{ needs.create-tag.outputs.version }}
      branch: ${{ inputs.branch }}
      build_apps: ${{ needs.prepare.outputs.build_apps }}
      notes: ${{ inputs.notes }}
      gray_percentage: ${{ inputs.gray_percentage }}
    secrets: inherit

  build-matrix-linux:
    needs: [prepare, create-tag]
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'linux' }}
    uses: ./.github/workflows/build-matrix-linux.yml
    with:
      version: ${{ needs.create-tag.outputs.version }}
      branch: ${{ inputs.branch }}
      build_apps: ${{ needs.prepare.outputs.build_apps }}
      notes: ${{ inputs.notes }}
      gray_percentage: ${{ inputs.gray_percentage }}
    secrets: inherit

  notify:
    needs: [build-matrix-windows, build-matrix-macos, build-matrix-linux, create-tag]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RESULTS='${{ toJson(needs) }}'
          if echo "$RESULTS" | grep -q '"failure"'; then ICON="❌"; \
          elif echo "$RESULTS" | grep -q '"cancelled"'; then ICON="⚠️"; \
          else ICON="✅"; fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf '%s\n%s\n%s' \
            "${ICON} ${{ github.workflow }}" \
            "Version: ${{ needs.create-tag.outputs.version }} | App: ${{ inputs.app }} | Platforms: ${{ inputs.platforms }}" \
            "Run: ${RUN_URL}")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}"
