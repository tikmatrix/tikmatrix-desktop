name: Build Matrix - Windows
run-name: ${{ github.actor }} is building Matrix (Windows) 🚀
on:
  workflow_call:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        type: string
      branch:
        description: "Branch to build from"
        required: false
        default: "main"
        type: string
      build_apps:
        description: "Apps to build"
        required: false
        default: "all"
        type: string
      notes:
        description: "Release notes (English)"
        required: false
        default: ""
        type: string
      gray_percentage:
        description: "Gray release percentage (0-100)"
        required: false
        default: "0"
        type: string

permissions:
  contents: read

jobs:
  build-tikmatrix-pro:
    if: ${{ inputs.build_apps == 'all' || inputs.build_apps == 'tikmatrix.pro' }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: tikmatrix/tikmatrix-pro
          token: ${{ secrets.REPO_TOKEN }}
          ref: ${{ inputs.branch }}
          path: tikmatrix-pro

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: tikmatrix-pro/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tikmatrix-pro/target
          key: ${{ runner.os }}-cargo-tikmatrix-pro-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tikmatrix-pro-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm install
        working-directory: tikmatrix-pro

      - name: Build TikMatrix Pro package
        run: .\build.ps1
        working-directory: tikmatrix-pro

      - name: Upload official package to R2
        uses: ryand56/r2-upload-action@b801a390acbdeb034c5e684ff5e1361c06639e7c # v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID_NIO }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID_NIO }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY_NIO }}
          r2-bucket: matrix
          source-dir: ./tikmatrix-pro/target/release/bundle/msi
          destination-dir: ./

      - name: Update version
        env:
          TIKMATRIX_API_KEY: ${{ secrets.TIKMATRIX_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cd tikmatrix-pro
          node ./scripts/update-version.js --platform=windows --app=tikmatrix.pro "--app-name=TikMatrix Pro" "--notes=${{ inputs.notes }}" --gray-percentage=${{ inputs.gray_percentage }}

      - name: Update TikMatrix Pro download url
        env:
          TIKMATRIX_API_KEY: ${{ secrets.TIKMATRIX_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cd tikmatrix-pro
          node ./scripts/update-download-url.js --platform=windows --distributor=OFFICIAL --app=tikmatrix.pro --app-name='TikMatrix Pro'

  build-tikmatrix:
    if: ${{ inputs.build_apps == 'all' || inputs.build_apps == 'tikmatrix' }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: tikmatrix/tikmatrix-pro
          token: ${{ secrets.REPO_TOKEN }}
          ref: ${{ inputs.branch }}
          path: tikmatrix-pro

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: tikmatrix-pro/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tikmatrix-pro/target
          key: ${{ runner.os }}-cargo-tikmatrix-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tikmatrix-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm install
        working-directory: tikmatrix-pro

      - name: Build TikMatrix whitelabel package
        run: |
          cd tikmatrix-pro
          node ./scripts/build-whitelabel.js TikMatrix

      - name: Upload TikMatrix package to R2
        uses: ryand56/r2-upload-action@b801a390acbdeb034c5e684ff5e1361c06639e7c # v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID_NIO }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID_NIO }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY_NIO }}
          r2-bucket: matrix
          source-dir: ./tikmatrix-pro/target/release/bundle/msi
          destination-dir: ./

      - name: Update TikMatrix version
        env:
          TIKMATRIX_API_KEY: ${{ secrets.TIKMATRIX_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cd tikmatrix-pro
          node ./scripts/update-version.js --platform=windows --app=tikmatrix --app-name=TikMatrix "--notes=${{ inputs.notes }}" --gray-percentage=${{ inputs.gray_percentage }}

      - name: Update TikMatrix download url
        env:
          TIKMATRIX_API_KEY: ${{ secrets.TIKMATRIX_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cd tikmatrix-pro
          node ./scripts/update-download-url.js --platform=windows --distributor=OFFICIAL --app=tikmatrix --app-name=TikMatrix

  build-igmatrix:
    if: ${{ inputs.build_apps == 'all' || inputs.build_apps == 'igmatrix' }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: tikmatrix/tikmatrix-pro
          token: ${{ secrets.REPO_TOKEN }}
          ref: ${{ inputs.branch }}
          path: tikmatrix-pro

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: tikmatrix-pro/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tikmatrix-pro/target
          key: ${{ runner.os }}-cargo-igmatrix-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-igmatrix-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm install
        working-directory: tikmatrix-pro

      - name: Build IgMatrix whitelabel package
        run: |
          cd tikmatrix-pro
          node ./scripts/build-whitelabel.js IgMatrix

      - name: Upload IgMatrix package to R2
