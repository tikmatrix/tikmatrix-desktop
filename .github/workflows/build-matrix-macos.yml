      - name: Update TikMatrix version (macOS)
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cd tikmatrix-pro
          node ./scripts/update-version.js --platform=mac --app=tikmatrix --app-name=TikMatrix "--notes=${{ inputs.notes }}" --gray-percentage=${{ inputs.gray_percentage }}

      - name: Update TikMatrix download url
        env:
          TIKMATRIX_API_KEY: ${{ secrets.TIKMATRIX_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cd tikmatrix-pro
          node ./scripts/update-download-url.js --platform=mac --distributor=OFFICIAL --app=tikmatrix --app-name=TikMatrix

  build-igmatrix:
    if: ${{ inputs.build_apps == 'all' || inputs.build_apps == 'igmatrix' }}
    runs-on: macos-latest
    steps:
