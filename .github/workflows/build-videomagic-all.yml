name: Build VideoMagic - All Platforms
run-name: ${{ github.actor }} is building VideoMagic (All Platforms) 🚀
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0), or 'auto' to use date+sha"
        required: false
        default: "auto"
        type: string
      branch:
        description: "Branch to build from"
        required: false
        default: "main"
        type: string
      notes:
        description: "Release notes (English). Used as fallback for all languages."
        required: false
        default: ""
        type: string
      gray_percentage:
        description: "Gray release percentage (0-100). Default 10 = roll out to 10% of devices first."
        required: false
        default: "0"
        type: string
      platforms:
        description: "Platforms to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
          - linux

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve-version.outputs.version }}
    steps:
      - name: Checkout VideoMagic repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tikmatrix/video-magic
          ref: ${{ inputs.branch }}
          token: ${{ secrets.REPO_TOKEN }}

      - name: Resolve version
        id: resolve-version
        run: |
          if [[ "${{ inputs.version }}" == "auto" || -z "${{ inputs.version }}" ]]; then
            VERSION="v$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.resolve-version.outputs.version }}"

          if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
            echo "Tag ${VERSION} already exists on remote, skipping tag creation"
          else
            git tag -a "${VERSION}" -m "Release ${VERSION}"
            git push origin "${VERSION}"
            echo "Tag ${VERSION} created and pushed successfully"
          fi

  build-videomagic-windows:
    needs: create-tag
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'windows' }}
    uses: ./.github/workflows/build-videomagic-windows.yml
    with:
      version: ${{ needs.create-tag.outputs.version }}
      branch: ${{ inputs.branch }}
      notes: ${{ inputs.notes }}
      gray_percentage: ${{ inputs.gray_percentage }}
    secrets: inherit

  build-videomagic-macos:
    needs: create-tag
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'macos' }}
    uses: ./.github/workflows/build-videomagic-macos.yml
    with:
      version: ${{ needs.create-tag.outputs.version }}
      branch: ${{ inputs.branch }}
      notes: ${{ inputs.notes }}
      gray_percentage: ${{ inputs.gray_percentage }}
    secrets: inherit

  build-videomagic-linux:
    needs: create-tag
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'linux' }}
    uses: ./.github/workflows/build-videomagic-linux.yml
    with:
      version: ${{ needs.create-tag.outputs.version }}
      branch: ${{ inputs.branch }}
      notes: ${{ inputs.notes }}
      gray_percentage: ${{ inputs.gray_percentage }}
    secrets: inherit

  notify:
    needs: [create-tag, build-videomagic-windows, build-videomagic-macos, build-videomagic-linux]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RESULTS='${{ toJson(needs) }}'
          if echo "$RESULTS" | grep -q '"failure"'; then ICON="❌"; \
          elif echo "$RESULTS" | grep -q '"cancelled"'; then ICON="⚠️"; \
          else ICON="✅"; fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf '%s\n%s\n%s' \
            "${ICON} ${{ github.workflow }}" \
            "Version: ${{ needs.create-tag.outputs.version }} | Branch: ${{ inputs.branch }}" \
            "Run: ${RUN_URL}")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}"
